name: Publish Maven Archetype

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Archetype version to publish (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up GPG
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.MAVEN_USERNAME }}",
              "password": "${{ secrets.MAVEN_PASSWORD }}"
            }]

      - name: Remove non-archetype files
        run: rm -rf screenshots/ inbox/ .idea/ .claude/ null/ target/

      - name: Generate archetype from project
        run: mvn archetype:create-from-project -DbuildDirectory=target -Darchetype.filteredExtensions=java,xml,properties,feature,json,yml,yaml

      - name: Locate generated archetype
        run: |
          ARCHETYPE_DIR=$(find . -path "*/generated-sources/archetype" -type d | head -1)
          echo "ARCHETYPE_DIR=$ARCHETYPE_DIR" >> $GITHUB_ENV
          echo "Found archetype at: $ARCHETYPE_DIR"

      - name: Set archetype version and metadata
        working-directory: ${{ env.ARCHETYPE_DIR }}
        run: |
          mvn versions:set -DnewVersion=${{ github.event.release.tag_name || github.event.inputs.version }} -DgenerateBackupPoms=false
          # Inject distributionManagement and SCM into archetype pom
          python3 - <<'EOF'
          import re, sys

          with open("pom.xml", "r") as f:
              content = f.read()

          dist = """
            <developers>
              <developer>
                <id>umutayb</id>
                <name>Umut Ay Bora</name>
                <url>https://github.com/Umutayb</url>
              </developer>
            </developers>

            <licenses>
              <license>
                <name>MIT License</name>
                <url>https://opensource.org/licenses/MIT</url>
              </license>
            </licenses>
          """

          plugins = """
                <plugin>
                  <groupId>org.sonatype.central</groupId>
                  <artifactId>central-publishing-maven-plugin</artifactId>
                  <version>0.8.0</version>
                  <extensions>true</extensions>
                  <configuration>
                    <publishingServerId>central</publishingServerId>
                    <autoPublish>true</autoPublish>
                    <waitUntil>published</waitUntil>
                  </configuration>
                </plugin>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-gpg-plugin</artifactId>
                  <version>1.6</version>
                  <executions>
                    <execution>
                      <id>sign-artifacts</id>
                      <phase>verify</phase>
                      <goals><goal>sign</goal></goals>
                      <configuration>
                        <gpgArguments>
                          <arg>--pinentry-mode</arg>
                          <arg>loopback</arg>
                        </gpgArguments>
                      </configuration>
                    </execution>
                  </executions>
                </plugin>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-source-plugin</artifactId>
                  <version>2.2.1</version>
                  <executions>
                    <execution>
                      <id>attach-sources</id>
                      <goals><goal>jar-no-fork</goal></goals>
                    </execution>
                  </executions>
                </plugin>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-javadoc-plugin</artifactId>
                  <version>2.9.1</version>
                  <executions>
                    <execution>
                      <id>attach-javadocs</id>
                      <goals><goal>jar</goal></goals>
                    </execution>
                  </executions>
                </plugin>
          """

          # Inject developers/licenses before </project>
          content = content.replace("</project>", dist + "\n</project>")
          # Inject publishing plugins into existing <build><plugins> section
          if "</plugins>" in content:
              content = content.replace("</plugins>", plugins + "\n    </plugins>", 1)
          else:
              content = content.replace("</project>", "  <build>\n    <plugins>\n" + plugins + "\n    </plugins>\n  </build>\n</project>")
          with open("pom.xml", "w") as f:
              f.write(content)
          print("pom.xml updated")
          EOF

      - name: Deploy archetype to Maven Central
        working-directory: ${{ env.ARCHETYPE_DIR }}
        run: mvn deploy -DskipTests
