name: Java CI with Maven

on:
  pull_request:
    branches:
      - main

jobs:
  regression-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Start Docker services
        run: docker compose up -d

      - name: Create Properties File
        run: |
          echo "
            secret-token=secret
            bookhive-api-url=http://localhost:8082
          " >> src/test/resources/secret.properties
          sed -i 's|bookhive-api-url=http://localhost:3000|bookhive-api-url=http://localhost:8082|g' src/test/resources/pickleib.properties

      - name: Wait for services
        run: |
          echo "Waiting for Vue test site..."
          timeout 30 bash -c 'until curl -sf http://localhost:7457 > /dev/null; do sleep 1; done'
          echo "Waiting for BookHive backend..."
          timeout 120 bash -c 'until curl -sf http://localhost:8082/api/health > /dev/null; do sleep 3; done'
          echo "Waiting for BookHive frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done'
          echo "Seeding BookHive..."
          curl -f -X POST http://localhost:8082/api/seed

      - name: Run tests
        run: mvn clean test -Dheadless=true -Dbrowser=chrome

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/reports/Cucumber.json
          retention-days: 7
