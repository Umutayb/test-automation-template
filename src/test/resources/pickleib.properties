receivers-directory=src/test/resources/files/notification/Receivers.json
report-directory=target/reports/Cucumber.json

hub-url=http://localhost:4444/wd/hub
detailed-logging=false
upload-results=false

driver-timeout=30000
element-timeout=30000
driver-maximize=false
delete-cookies=true

selenium-grid=false
frame-height=1920
frame-width=500
save-logs=false
browser=chrome
headless=true

website-basic-auth=false
test-url=http://127.0.0.1:7457/
acc-url=none

# BookHive — bookhive-url is the frontend (browser navigation), bookhive-api-url is the backend host (API calls)
bookhive-url=http://localhost:3000
bookhive-api-url=http://localhost:3000

load-strategy=normal
selenium-log-level=off
print-headers=true
insecure-localhost=true
verify-hostname=true

config=src/test/resources/configurations
use-appium2=true
device=InventoryApp
port=4723
start-service=true
address=0.0.0.0